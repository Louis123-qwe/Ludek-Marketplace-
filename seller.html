<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Seller Profile — Ludek Marketplace</title>
  <meta name="description" content="View this seller's listings on Ludek Marketplace — CRUTECH Okuku Campus." />
  <meta name="theme-color" content="#2D5016" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="seller-public.css" />
</head>

<body>

  <!-- Page Loader -->
  <div id="pageLoader" class="page-loader" aria-hidden="true">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="width:44px;height:44px;background:var(--forest);border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-store-alt" style="color:var(--milk);font-size:20px;"></i>
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ── Top Nav ── -->
  <nav class="sp-nav" id="mainNav">
    <div class="sp-nav-inner">
      <a href="index.html" class="sp-nav-logo">
        <div class="sp-nav-logo-icon"><i class="fas fa-store-alt"></i></div>
        <span>Ludek</span>
      </a>
      <a href="marketplace.html" class="btn btn-outline-forest sp-nav-back">
        <i class="fas fa-arrow-left"></i> Marketplace
      </a>
    </div>
  </nav>

  <!-- ── Not Found State (hidden by default) ── -->
  <div class="sp-not-found" id="sellerNotFound" style="display:none;" aria-live="polite">
    <i class="fas fa-store-slash"></i>
    <h2>Seller Not Found</h2>
    <p>This store doesn't exist or may have been removed.</p>
    <a href="marketplace.html" class="btn btn-primary">Browse Marketplace</a>
  </div>

  <!-- ── Main Storefront (shown after data loads) ── -->
  <main class="sp-main" id="sellerMain" style="visibility:hidden;">

    <!-- Banner -->
    <div class="sp-banner" id="sellerBanner">
      <div class="sp-banner-placeholder" id="bannerPlaceholder">
        <i class="fas fa-image"></i>
      </div>
      <img id="bannerImg" src="" alt="Store banner" style="display:none;" />
    </div>

    <!-- Store Header -->
    <div class="sp-header-wrap">
      <div class="sp-header-inner">

        <!-- Avatar -->
        <div class="sp-avatar-wrap">
          <div class="sp-avatar" id="sellerAvatar">
            <i class="fas fa-user"></i>
          </div>
        </div>

        <!-- Info + CTA -->
        <div class="sp-header-body">
          <div class="sp-header-text">
            <h1 class="sp-store-name" id="sellerStoreName">Loading…</h1>
            <div class="sp-store-meta" id="sellerMeta"></div>
            <p class="sp-store-bio" id="sellerBio" style="display:none;"></p>
          </div>
          <div class="sp-header-cta">
            <a href="#" id="whatsappContactBtn" class="btn btn-whatsapp" target="_blank" rel="noopener" style="display:none;">
              <i class="fab fa-whatsapp"></i> Chat Seller
            </a>
          </div>
        </div>

      </div>
    </div>

    <!-- Listings Section -->
    <div class="sp-listings-section">
      <div class="sp-listings-header">
        <h2 class="sp-listings-title">Listings <span class="sp-listings-count" id="listingsCount"></span></h2>
        <!-- Filter chips -->
        <div class="sp-filter-chips" id="filterChips" role="list" aria-label="Filter by category"></div>
      </div>

      <!-- Loading skeleton -->
      <div class="sp-listings-loading" id="listingsLoading" aria-label="Loading listings">
        <div class="sp-skeleton-grid">
          <div class="sp-skeleton-card"></div>
          <div class="sp-skeleton-card"></div>
          <div class="sp-skeleton-card"></div>
          <div class="sp-skeleton-card"></div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="sp-empty" id="listingsEmpty" style="display:none;">
        <i class="fas fa-box-open"></i>
        <p>No listings yet.</p>
      </div>

      <!-- Listings grid -->
      <div class="sp-listings-grid" id="listingsGrid" style="display:none;" role="list"></div>

    </div>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <div id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top"><i class="fas fa-arrow-up"></i></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="config.js"></script>
  <script>
  // Initialize Firebase for public seller page
  if (window.LUDEK_FIREBASE_CONFIG && !firebase.apps.length) {
    firebase.initializeApp(window.LUDEK_FIREBASE_CONFIG);
  }
  </script>
  <script src="app.js" defer></script>
  <script src="seller-public.js" defer></script>
</body>
</html>
